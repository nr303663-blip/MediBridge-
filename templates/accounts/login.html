{% extends "base.html" %}
{% block title %}Login — MediBridge{% endblock %}
{% block content %}
<div class="auth-card">
    <h1>Log In</h1>
    <p class="subtitle">Patients, doctors, and admins all log in here.</p>
    <form method="post" novalidate>
        {% csrf_token %}
        {{ form.as_p }}
        <button type="submit" class="btn-primary">Log In</button>
    </form>
    <p class="auth-links">Don't have an account? <a href="{% url 'accounts:signup_choice' %}">Sign up</a></p>
</div>
{% endblock %}
