{% extends "base.html" %}
{% block title %}Doctor Sign Up — MediBridge{% endblock %}
{% block content %}
<div class="auth-card">
    <h1>Doctor Sign Up</h1>
    <p class="subtitle">Your account will need admin approval before it goes live.</p>
    <form method="post" novalidate>
        {% csrf_token %}
        {{ form.as_p }}
        <button type="submit" class="btn-primary">Create Account</button>
    </form>
    <p class="auth-links">Already have an account? <a href="{% url 'accounts:login' %}">Log in</a></p>
</div>
{% endblock %}
