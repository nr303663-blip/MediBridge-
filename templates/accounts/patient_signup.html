{% extends "base.html" %}
{% block title %}Patient Sign Up — MediBridge{% endblock %}
{% block content %}
<div class="auth-card">
    <h1>Patient Sign Up</h1>
    <p class="subtitle">Create your MediBridge patient account.</p>
    <form method="post" novalidate>
        {% csrf_token %}
        {{ form.as_p }}
        <button type="submit" class="btn-primary">Create Account</button>
    </form>
    <p class="auth-links">Already have an account? <a href="{% url 'accounts:login' %}">Log in</a></p>
</div>
{% endblock %}
